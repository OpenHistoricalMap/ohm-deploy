worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    sendfile on;
    keepalive_timeout 65;

    # === Tile cache ===
    proxy_cache_path /var/cache/nginx/tiles
        levels=1:2
        keys_zone=tiles:200m
        max_size=20g
        inactive=7d
        use_temp_path=off;

    # =============================================
    # === Gzip compression for MVT tiles ===
    # To disable: set NGINX_GZIP=off in env or change 'on' to 'off' below.
    # =============================================
    gzip on;
    gzip_types application/x-protobuf application/vnd.mapbox-vector-tile application/octet-stream;
    gzip_min_length 256;
    gzip_comp_level 4;   # 1=fastest/less compression, 9=slowest/best compression
    gzip_vary on;
    gzip_proxied any;

    upstream martin {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # === Proxy timeouts for large composite tiles ===
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_buffers 16 256k;
    proxy_buffer_size 128k;

    # === Prevent double gzip ===
    # Tell Martin not to compress responses (strip Accept-Encoding from upstream requests).
    # Nginx handles all compression via the gzip directives above.
    proxy_set_header Accept-Encoding "";

    server {
        listen 80;

        # Health and catalog
        location /catalog {
            proxy_set_header Host $http_host;
            proxy_pass http://martin;
        }
        location /health {
            proxy_set_header Host $http_host;
            proxy_pass http://martin;
        }

        # Composite tile routes (one per group, Tegola-compatible)
        # /maps/{group}/{z}/{x}/{y}.pbf -> all layers in one tile
                # Composite: /maps/ohm/{z}/{x}/{y}.pbf
        location ~ ^/maps/ohm/(\d+/\d+/\d+)\.pbf$ {
            proxy_cache tiles;
            proxy_cache_valid 200 1h;
            proxy_cache_valid 204 1m;
            proxy_cache_key $uri;
            proxy_cache_lock on;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_background_update on;
            add_header X-Cache-Status $upstream_cache_status;
            proxy_set_header Host $http_host;
            proxy_pass http://martin/land_ohm_lines,land_ohm_centroids,land_ohm_maritime,place_areas,place_points_centroids,water_areas,water_areas_centroids,water_lines,transport_areas,transport_lines,route_lines,transport_points_centroids,amenity_areas,amenity_points_centroids,buildings,buildings_points_centroids,landuse_areas,landuse_points_centroids,landuse_lines,other_areas,other_points_centroids,other_lines/$1;
        }

        # Composite: /maps/ohm_admin/{z}/{x}/{y}.pbf
        location ~ ^/maps/ohm_admin/(\d+/\d+/\d+)\.pbf$ {
            proxy_cache tiles;
            proxy_cache_valid 200 1h;
            proxy_cache_valid 204 1m;
            proxy_cache_key $uri;
            proxy_cache_lock on;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_background_update on;
            add_header X-Cache-Status $upstream_cache_status;
            proxy_set_header Host $http_host;
            proxy_pass http://martin/boundaries/$1;
        }

        # Per-layer routes: /maps/{group}/{layer}/{z}/{x}/{y}.pbf
                # Per-layer: /maps/ohm/{layer}/{z}/{x}/{y}.pbf
        location ~ ^/maps/ohm/([^/]+)(\d+/\d+/\d+)\.pbf$ {
            proxy_cache tiles;
            proxy_cache_valid 200 1h;
            proxy_cache_valid 204 1m;
            proxy_cache_key $uri;
            proxy_cache_lock on;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_background_update on;
            add_header X-Cache-Status $upstream_cache_status;
            proxy_set_header Host $http_host;
            proxy_pass http://martin/$1/$2;
        }
        location ~ ^/maps/ohm/([^/]+)(/.*)$ {
            proxy_cache tiles;
            proxy_cache_valid 200 1h;
            proxy_cache_valid 204 1m;
            proxy_cache_key $uri;
            proxy_cache_lock on;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_background_update on;
            add_header X-Cache-Status $upstream_cache_status;
            proxy_set_header Host $http_host;
            proxy_pass http://martin/$1$2;
        }

        # Per-layer: /maps/ohm_admin/{layer}/{z}/{x}/{y}.pbf
        location ~ ^/maps/ohm_admin/([^/]+)(\d+/\d+/\d+)\.pbf$ {
            proxy_cache tiles;
            proxy_cache_valid 200 1h;
            proxy_cache_valid 204 1m;
            proxy_cache_key $uri;
            proxy_cache_lock on;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_background_update on;
            add_header X-Cache-Status $upstream_cache_status;
            proxy_set_header Host $http_host;
            proxy_pass http://martin/$1/$2;
        }
        location ~ ^/maps/ohm_admin/([^/]+)(/.*)$ {
            proxy_cache tiles;
            proxy_cache_valid 200 1h;
            proxy_cache_valid 204 1m;
            proxy_cache_key $uri;
            proxy_cache_lock on;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_background_update on;
            add_header X-Cache-Status $upstream_cache_status;
            proxy_set_header Host $http_host;
            proxy_pass http://martin/$1$2;
        }

        # Serve config files (functions.json for the viewer)
        location /config/ {
            alias /app/config/;
            add_header Content-Type application/json;
        }

        # Viewer
        location = / {
            default_type text/html;
            root /app/static;
            try_files /index.html =404;
        }

        # Fallback
        location / {
            proxy_set_header Host $http_host;
            proxy_pass http://martin;
        }
    }
}
