        # Composite tile routes (one per group, Tegola-compatible)
        # /maps/{group}/{z}/{x}/{y}.pbf -> all layers in one tile
                # Composite: /maps/ohm/{z}/{x}/{y}.pbf
        location ~ ^/maps/ohm/(\d+/\d+/\d+)\.pbf$ {
            proxy_cache tiles;
            proxy_cache_valid 200 30d;
            proxy_cache_valid 204 1m;
            proxy_cache_key $uri;
            proxy_cache_lock on;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_background_update on;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control $tile_cache_control;
            add_header Access-Control-Allow-Origin "*";
            proxy_set_header Host $http_host;
