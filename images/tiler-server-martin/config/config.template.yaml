listen_addresses: '0.0.0.0:3000'
worker_processes: 8

postgres:
  connection_string: 'postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}'
  pool_size: 50
  default_srid: 3857
  auto_publish:
    tables: false
    functions:
      from_schemas: public
