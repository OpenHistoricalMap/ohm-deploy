services:
  tiler_db:
    container_name: tiler_db
    image: ghcr.io/openhistoricalmap/tiler-db:0.0.1-0.dev.git.2166.hc55c4cd
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes: !overwrite
      - tiler_pgdata:/var/lib/postgresql/data
      - ./config/postgresql.production.conf:/etc/postgresql/postgresql.conf
    ports:
      - "54329:5432"
    env_file:
      - .env.tiler
    mem_limit: 100G
    cpus: "30.0"
    shm_size: 16g
    networks:
      - ohm_network

  tiler_imposm:
    container_name: tiler_imposm
    image: ghcr.io/openhistoricalmap/tiler-imposm:0.0.1-0.dev.git.3349.h2739b4b1
    volumes:
      - tiler_imposm_data:/mnt/data
    env_file:
      - .env.tiler
    command:
      - sh
      - -c
      - |
        while true; do
          # make sure you disable this for importing the data
          sleep 600
          ./liveness.sh || exit 1
        done &
        ./start.sh
    restart: always
    networks:
      - ohm_network

  tiler_sqs_cleaner:
    container_name: tiler_sqs_cleaner
    image: ghcr.io/openhistoricalmap/tiler-cache:0.0.1-0.dev.git.3348.h372d22c4
    environment:
      - PORT=8000
    env_file:
      - .env.tiler
    command:
      - /bin/sh
      - -c
      - |
        set -x
        python sqs_processor.py &
        python main.py
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 3
      timeout: 5s
    networks:
      - ohm_network

  tiler_monitor:
    container_name: tiler_monitor
    image: ghcr.io/openhistoricalmap/tiler-monitor:0.0.1-0.dev.git.3348.h4fbb83d8
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # - ../../images/tiler-monitor:/app
      - ../../hetzner:/app/hetzner
      - tiler_monitor_data:/data
    environment:
      - DOCKER_CONFIG_ENVIRONMENT=production
    stdin_open: true
    tty: true
    env_file:
      - .env.tiler
    networks:
      - ohm_network

  tiler_server_martin:
    container_name: tiler_server_martin
    image: ghcr.io/openhistoricalmap/tiler-server-martin:0.0.1-0.dev.git.3349.h2739b4b1
    restart: always
    environment:
      - OHM_DOMAIN=${OHM_DOMAIN:-openhistoricalmap.org}
    env_file:
      - .env.tiler
    ports:
      - "3030:80"
    networks:
      - ohm_network

  tiler_varnish:
    container_name: tiler_varnish
    image: varnish:7.5
    restart: always
    ports:
      - "6081:6081"
    volumes:
      - ../../images/tiler-varnish/default.vcl:/etc/varnish/default.vcl:ro
    tmpfs:
      - /var/lib/varnish/varnishd:exec
    command: >
      varnishd -F
      -a :6081
      -f /etc/varnish/default.vcl
      -s dynamic=malloc,${VARNISH_DYNAMIC_SIZE:-16G}
      -s static=malloc,${VARNISH_STATIC_SIZE:-4G}
      -p thread_pool_min=100
      -p thread_pool_max=2000
      -p thread_pools=2
      -p workspace_backend=256k
      -p workspace_client=256k
      -p http_resp_hdr_len=32k
      -p http_resp_size=256k
      -p nuke_limit=1000
      -p timeout_idle=30
      -p feature=+http2
    mem_limit: 24G
    cpus: "4.0"
    ulimits:
      memlock: -1
      nofile:
        soft: 131072
        hard: 131072
    networks:
      - ohm_network
    depends_on:
      - tiler_server_martin


volumes:
  tiler_pgdata:
    driver: local
    name: tiler_db_2104
  tiler_imposm_data:
    driver: local
    name: tiler_imposm_2104
  tiler_monitor_data:
    driver: local
    name: tiler_monitor_2104
networks:
  ohm_network:
    external: true
    