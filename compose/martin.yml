# Martin tile server + Varnish cache
# Caching: Varnish only. Nginx in Martin does routing/gzip/tilejson/static.
# Invalidation: BAN requests from tiler-cache (replaces TTL-based invalidation).
services:
  varnish:
    image: varnish:7.5
    container_name: varnish
    ports:
      - "6081:6081"
    volumes:
      - ../images/varnish-poc/default.vcl:/etc/varnish/default.vcl:ro
      - varnish_storage:/var/lib/varnish
    command: >
      varnishd -F
      -a :6081
      -f /etc/varnish/default.vcl
      -s dynamic=file,/var/lib/varnish/dynamic.bin,${VARNISH_DYNAMIC_SIZE:-20G}
      -s static=file,/var/lib/varnish/static.bin,${VARNISH_STATIC_SIZE:-10G}
      -p default_ttl=604800
      -p default_grace=3600
      -p workspace_client=256k
      -p workspace_backend=256k
      -p http_req_hdr_len=32768
      -p http_resp_hdr_len=32768
      -p thread_pool_min=100
      -p thread_pool_max=5000
    networks:
      - ohm_network
    depends_on:
      - martin

  martin:
    container_name: martin
    image: rub21/tiler-server-martin:v1
    build:
      context: ../images/tiler-server-martin
      dockerfile: Dockerfile
    volumes:
      - ../images/tiler-server-martin:/app
    ports:
      - "3020:80"
    expose:
      - "3001"
    env_file:
      - ../envs/.env.tiler
    environment:
      - OHM_DOMAIN=${OHM_DOMAIN:-openhistoricalmap.org}
    networks:
      - ohm_network

  tiler-cache:
    container_name: tiler-cache
    image: ohm/tiler-cache:latest
    build:
      context: ../images/tiler-cache
      dockerfile: Dockerfile
    volumes:
      - ../images/tiler-cache:/app
    ports:
      - "8000:8000"
    command:
      - /bin/sh
      - -c
      - |
        set -x
        python sqs_processor.py &
        python main.py
    env_file:
      - ../envs/.env.tiler
    environment:
      - PORT=8000
      - TILE_CACHE_BACKEND=varnish
      - VARNISH_URL=http://varnish:6081
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ohm_network
    depends_on:
      - varnish

volumes:
  varnish_storage:
    driver: local
    name: varnish_storage

networks:
  ohm_network:
    external: true
