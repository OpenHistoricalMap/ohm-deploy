# Martin tile server + cache purge service
# Both share the martin_nginx_cache volume:
#   - martin: nginx writes cached tiles to the volume
#   - tiler-cache: receives expire notifications and deletes stale tiles from the volume
services:
  martin:
    image: rub21/tiler-server-martin:v1
    build:
      context: ../images/tiler-server-martin
      dockerfile: Dockerfile
    volumes:
      - ../images/tiler-server-martin:/app
      - martin_nginx_cache:/var/cache/nginx
    ports:
      - "3020:80"
    env_file:
      - ../envs/.env.tiler
    # restart: always
    networks:
      - ohm_network

  tiler-cache:
    image: ohm/tiler-cache:latest
    build:
      context: ../images/tiler-cache
      dockerfile: Dockerfile
    volumes:
      - martin_nginx_cache:/var/cache/nginx
      - ../images/tiler-server-martin/config/functions.json:/app/config/functions.json:ro
    env_file:
      - ../envs/.env.tiler
    restart: always
    networks:
      - ohm_network

volumes:
  martin_nginx_cache:
    driver: local
    name: martin_nginx_cache

networks:
  ohm_network:
    external: true
