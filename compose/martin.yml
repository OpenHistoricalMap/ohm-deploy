services:
  martin:
    image: rub21/tiler-server-martin:v1
    build:
      context: ../images/tiler-server-martin
      dockerfile: Dockerfile
    volumes:
      - ../images/tiler-server-martin:/app
      - martin_nginx_cache:/var/cache/nginx/tiles
      - martin_nginx_cache_static:/var/cache/nginx/static_tiles
    ports:
      - "3020:80"
    env_file:
      - ../envs/.env.tiler
    environment:
      - MARTIN_INTERNAL_PORT=3000
      - MARTIN_POOL_SIZE=50
      - MARTIN_WORKER_PROCESSES=8
    # restart: always
    networks:
      - ohm_network

volumes:
  martin_nginx_cache:
    driver: local
    name: martin_nginx_cache
  martin_nginx_cache_static:
    driver: local
    name: martin_nginx_cache_static

networks:
  ohm_network:
    external: true
