services:
  db:
    image: rub21/ohm-tiler-db:v1
    container_name: db
    build:
      context: ../images/tiler-db
      dockerfile: Dockerfile
    ports:
      - "54321:5432"
    volumes:
      - tiler_pgdata:/var/lib/postgresql/data
    env_file:
      - ../envs/.env.tiler
    restart: always
    networks:
      - ohm_network

  imposm:
    image: rub21/tiler-imposm:v1
    container_name: imposm
    build:
      context: ../images/tiler-imposm
      dockerfile: Dockerfile
    volumes:
      - ../images/tiler-imposm:/osm
      - tiler_imposm_data:/mnt/data
    command:
      - sh
      - -c
      - "./start.sh"
    env_file:
      - ../envs/.env.tiler
    networks:
      - ohm_network

  tiler:
    image: rub21/tiler-server:v1
    container_name: tiler
    build:
      context: ../images/tiler-server
      dockerfile: Dockerfile
    volumes:
      - ../hetzner:/hetzner
      - ../images/tiler-server:/app
    ports:
      - "9090:9090"
    env_file:
      - ../envs/.env.tiler
    restart: always
    networks:
      - ohm_network

  # tiler-cache:
