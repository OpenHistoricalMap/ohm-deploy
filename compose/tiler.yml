  #   image: rub21/tiler-monitor:v1
  #   build:
  #     context: ../images/tiler-monitor
  #     dockerfile: Dockerfile
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - ../images/tiler-monitor:/app
